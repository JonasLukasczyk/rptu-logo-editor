    <script>
async function redirectIfLoggedIn() {
  try {
    const response = await fetch('/Shibboleth.sso/Session', {
      method: 'GET',
      credentials: 'include',
    });
    if (response.status === 200) {
      const text = await response.text();
      console.log(text);
      if (!text.includes('A valid session was not found')) {
        window.location.href = '/app';
      }
    }
  } catch (err) {
    console.log('No Shibboleth session detected.');
  }
}
window.addEventListener('pageshow', function (event) {
  redirectIfLoggedIn();
});
    </script>
